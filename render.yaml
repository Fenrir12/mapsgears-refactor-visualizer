services:
  - type: web
    name: refactor-visualizer
    runtime: node
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: PHAB_URL
        sync: false
      - key: PHAB_API_TOKEN
        sync: false
      - key: REPO_CALLSIGN
        sync: false
      - key: TARGET_FOLDER
        sync: false
      - key: COMPARE_FOLDER
        sync: false
      - key: EXTRA_FOLDERS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: SYNC_INTERVAL_HOURS
        value: "6"
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: NODE_ENV
        value: "production"
